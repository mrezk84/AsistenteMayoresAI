<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Asistente - Redireccionando...</title>
    <script>
      // GitHub Pages SPA redirect trick
      // When GitHub Pages serves a 404 for a client-side route,
      // this script preserves the path and redirects to index.html
      // which then restores the route for React Router to handle.
      var pathSegmentsToKeep = 1; // Keep /AsistenteMayoresAI/
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
