<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Gradiente principal cálido -->
    <radialGradient id="warmGlow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f0f9ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmGlow2" cx="80%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0f9ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmGlow3" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#eff6ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f9fafb" stop-opacity="0"/>
    </radialGradient>

    <!-- Filtro suave -->
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="bigBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Fondo base -->
  <rect width="1920" height="1080" fill="#f0f5ff"/>

  <!-- Halos de luz cálidos -->
  <rect width="1920" height="1080" fill="url(#warmGlow1)"/>
  <rect width="1920" height="1080" fill="url(#warmGlow2)"/>
  <rect width="1920" height="1080" fill="url(#warmGlow3)"/>

  <!-- Burbujas de chat decorativas (esquina superior derecha) -->
  <g opacity="0.12" filter="url(#softBlur)">
    <!-- Burbuja 1 -->
    <rect x="1500" y="80" width="180" height="60" rx="30" fill="#3b82f6"/>
    <circle cx="1510" cy="140" r="10" fill="#3b82f6"/>
    <!-- Burbuja 2 -->
    <rect x="1550" y="170" width="220" height="60" rx="30" fill="#60a5fa"/>
    <circle cx="1760" cy="230" r="10" fill="#60a5fa"/>
    <!-- Burbuja 3 -->
    <rect x="1480" y="260" width="160" height="50" rx="25" fill="#93c5fd"/>
  </g>

  <!-- Burbujas de chat decorativas (esquina inferior izquierda) -->
  <g opacity="0.1" filter="url(#softBlur)">
    <rect x="80" y="800" width="200" height="55" rx="28" fill="#3b82f6"/>
    <circle cx="90" cy="855" r="9" fill="#3b82f6"/>
    <rect x="60" y="880" width="250" height="55" rx="28" fill="#60a5fa"/>
    <circle cx="300" cy="935" r="9" fill="#60a5fa"/>
  </g>

  <!-- Corazones pequeños dispersos -->
  <g opacity="0.08">
    <!-- Corazón 1 (arriba izquierda) -->
    <path d="M150,200 C150,185 165,175 180,185 C195,175 210,185 210,200 C210,220 180,240 180,240 C180,240 150,220 150,200Z" fill="#f472b6" filter="url(#softBlur)"/>
    <!-- Corazón 2 (centro derecha) -->
    <path d="M1700,500 C1700,488 1712,480 1724,488 C1736,480 1748,488 1748,500 C1748,516 1724,530 1724,530 C1724,530 1700,516 1700,500Z" fill="#f472b6" filter="url(#softBlur)"/>
    <!-- Corazón 3 (abajo centro) -->
    <path d="M900,920 C900,908 912,900 924,908 C936,900 948,908 948,920 C948,936 924,950 924,950 C924,950 900,936 900,920Z" fill="#c084fc" filter="url(#softBlur)"/>
  </g>

  <!-- Círculos suaves / Nubes abstractas -->
  <g opacity="0.06" filter="url(#bigBlur)">
    <circle cx="300" cy="150" r="120" fill="#93c5fd"/>
    <circle cx="380" cy="130" r="90" fill="#a5b4fc"/>
    <circle cx="250" cy="180" r="80" fill="#bfdbfe"/>

    <circle cx="1600" cy="850" r="100" fill="#93c5fd"/>
    <circle cx="1680" cy="830" r="75" fill="#c4b5fd"/>
    <circle cx="1550" cy="880" r="65" fill="#bfdbfe"/>
  </g>

  <!-- Icono de libro/tablet estilizado (centro izquierda) -->
  <g opacity="0.07" transform="translate(120, 450)" filter="url(#softBlur)">
    <rect x="0" y="0" width="100" height="130" rx="12" fill="#3b82f6" stroke="#2563eb" stroke-width="3"/>
    <rect x="15" y="15" width="70" height="8" rx="4" fill="#bfdbfe"/>
    <rect x="15" y="30" width="55" height="8" rx="4" fill="#bfdbfe"/>
    <rect x="15" y="45" width="65" height="8" rx="4" fill="#bfdbfe"/>
    <rect x="15" y="60" width="45" height="8" rx="4" fill="#bfdbfe"/>
    <circle cx="50" cy="105" r="12" fill="#bfdbfe"/>
  </g>

  <!-- Icono de micrófono estilizado (derecha medio) -->
  <g opacity="0.07" transform="translate(1750, 350)" filter="url(#softBlur)">
    <rect x="25" y="0" width="30" height="60" rx="15" fill="#3b82f6"/>
    <path d="M10,50 C10,75 70,75 70,50" stroke="#3b82f6" stroke-width="4" fill="none"/>
    <line x1="40" y1="75" x2="40" y2="95" stroke="#3b82f6" stroke-width="4"/>
    <line x1="25" y1="95" x2="55" y2="95" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Ondas suaves superiores -->
  <path d="M0,120 Q480,60 960,100 Q1440,140 1920,80" stroke="#93c5fd" stroke-width="2" fill="none" opacity="0.08"/>
  <path d="M0,140 Q480,80 960,120 Q1440,160 1920,100" stroke="#a5b4fc" stroke-width="1.5" fill="none" opacity="0.06"/>

  <!-- Ondas suaves inferiores -->
  <path d="M0,980 Q480,940 960,960 Q1440,980 1920,950" stroke="#93c5fd" stroke-width="2" fill="none" opacity="0.08"/>
  <path d="M0,1000 Q480,960 960,980 Q1440,1000 1920,970" stroke="#a5b4fc" stroke-width="1.5" fill="none" opacity="0.06"/>

  <!-- Puntos decorativos dispersos -->
  <g opacity="0.06" fill="#3b82f6">
    <circle cx="500" cy="300" r="4"/>
    <circle cx="700" cy="150" r="3"/>
    <circle cx="1100" cy="250" r="5"/>
    <circle cx="1300" cy="400" r="3"/>
    <circle cx="400" cy="700" r="4"/>
    <circle cx="800" cy="800" r="3"/>
    <circle cx="1200" cy="700" r="5"/>
    <circle cx="1500" cy="600" r="3"/>
    <circle cx="600" cy="500" r="4"/>
    <circle cx="1000" cy="600" r="3"/>
  </g>
</svg>
